<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>WebView 能力测试</title>
<style>
 html, body { margin: 0; height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
 #app { display: flex; flex-direction: column; height: 100%; background: #f0f0f0; }
 #header {
 background: #fff; padding: 10px 12px; border-bottom: 1px solid #ddd;
 font-weight: 600; font-size: 14px; color: #1c1c1e; flex-shrink: 0;
 }
 #mapWrap { flex: 1; position: relative; min-height: 0; background: #dde3ea; }
 #mapCanvas { width: 100%; height: 100%; display: block; touch-action: none; }
 #overlay {
 position: absolute; top: 12px; left: 12px; z-index: 2;
 background: rgba(255,255,255,.94); padding: 6px 10px; border-radius: 8px;
 font-size: 12px; color: #333; box-shadow: 0 1px 4px rgba(0,0,0,.15);
 }
 #zoomBar {
 position: absolute; bottom: 12px; right: 12px; z-index: 3;
 display: flex; flex-direction: column; gap: 6px;
 }
 #zoomBar button {
 width: 36px; height: 36px; border: none; border-radius: 8px;
 background: #fff; font-size: 20px; line-height: 1;
 box-shadow: 0 1px 4px rgba(0,0,0,.2); color: #007aff;
 }
 #checks {
 background: #fff; border-top: 1px solid #ddd; max-height: 34%;
 overflow: auto; padding: 8px 12px 12px; flex-shrink: 0;
 }
 .check { margin: 5px 0; font-size: 12px; line-height: 1.45; }
 .pass { color: #2e7d32; }
 .fail { color: #c62828; }
 .pending { color: #888; }
 .summary { font-weight: 600; margin-bottom: 6px; font-size: 13px; }
</style>
</head>
<body>
<div id="app">
 <div id="header">📍 WebView 能力测试 · 华亭嘉园 Canvas 规范</div>
 <div id="mapWrap">
 <canvas id="mapCanvas"></canvas>
 <div id="overlay">CSS 绝对定位 · z-index 层</div>
 <div id="zoomBar">
 <button id="zoomIn" type="button" aria-label="放大">+</button>
 <button id="zoomOut" type="button" aria-label="缩小">−</button>
 </div>
 </div>
 <div id="checks"></div>
</div>
<script>
(() => {
 const TILE = 256;
 const checksEl = document.getElementById("checks");
 const canvas = document.getElementById("mapCanvas");
 const mapWrap = document.getElementById("mapWrap");
 const overlay = document.getElementById("overlay");
 const tileCache = new Map();
 const state = {
 zoom: 16,
 cx: 116.3617,
 cy: 39.9785,
 tileOk: false,
 tileDrawn: false,
 tilesVisible: 0,
 zoomClicked: false,
 loadGen: 0
 };

 const tests = [
 { id: "js", name: "JavaScript 已启用", run: () => true },
 { id: "flex", name: "flex:1 地图区撑满白板（非固定 400px）", run: () => checkFlexLayout() },
 { id: "canvas", name: "Canvas 2D 上下文可用", run: () => !!canvas.getContext("2d") },
 { id: "css", name: "CSS 绝对定位 + z-index 浮层可见", run: () => {
 const r = overlay.getBoundingClientRect();
 return r.width > 40 && r.height > 16;
 }},
 { id: "draw", name: "Canvas 绘制 marker 与标注", run: () => drawFrame() },
 { id: "tile", name: "高德瓦片加载并绘制（需网络）", run: () => state.tileDrawn, async: true },
 { id: "zoom", name: "± 缩放按钮已显示（点一下验证交互）", run: () => checkZoomVisible() }
 ];

 function checkFlexLayout() {
 const h = mapWrap.clientHeight;
 const appH = document.getElementById("app").clientHeight || window.innerHeight;
 const ratio = appH > 0 ? h / appH : 0;
 return h >= 80 && ratio >= 0.2;
 }

 function checkZoomVisible() {
 const btn = document.getElementById("zoomIn");
 if (!btn) return false;
 const r = btn.getBoundingClientRect();
 return r.width >= 28 && r.height >= 28;
 }

 function flexDetail() {
 const h = mapWrap.clientHeight;
 const appH = document.getElementById("app").clientHeight || window.innerHeight;
 const ratio = appH > 0 ? Math.round((h / appH) * 100) : 0;
 return h + "px（占页面 " + ratio + "%）";
 }

 function setStatus(id, ok, detail) {
 const el = document.getElementById("chk-" + id);
 if (!el) return;
 el.className = "check " + (ok ? "pass" : "fail");
 el.textContent = (ok ? "✓ " : "✗ ") + el.dataset.label + (detail ? " — " + detail : "");
 }

 function renderList() {
 checksEl.innerHTML = '<div class="summary">自检清单（App 侧通过后再交给 Gateway 发布同路径文件）</div>';
 tests.forEach(t => {
 const div = document.createElement("div");
 div.id = "chk-" + t.id;
 div.className = "check pending";
 div.dataset.label = t.name;
 div.textContent = "… " + t.name;
 checksEl.appendChild(div);
 });
 }

 function lonLatToPixel(lon, lat, z) {
 const n = Math.pow(2, z);
 const x = (lon + 180) / 360 * n * TILE;
 const y = (1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * n * TILE;
 return { x, y };
 }

 function mapOrigin() {
 const w = mapWrap.clientWidth;
 const h = mapWrap.clientHeight;
 const center = lonLatToPixel(state.cx, state.cy, state.zoom);
 const tx = Math.floor(center.x / TILE);
 const ty = Math.floor(center.y / TILE);
 const ox = w / 2 - (center.x - tx * TILE);
 const oy = h / 2 - (center.y - ty * TILE);
 return { w, h, tx, ty, ox, oy };
 }

 function tileJobs() {
 const { w, h, tx, ty } = mapOrigin();
 const radiusX = Math.ceil(w / TILE / 2) + 1;
 const radiusY = Math.ceil(h / TILE / 2) + 1;
 const jobs = [];
 for (let dy = -radiusY; dy <= radiusY; dy++) {
 for (let dx = -radiusX; dx <= radiusX; dx++) {
 jobs.push({ x: tx + dx, y: ty + dy, dx, dy });
 }
 }
 return jobs;
 }

 function tileKey(z, x, y) {
 return z + "/" + x + "/" + y;
 }

 function tileUrl(z, x, y) {
 return "https://webrd0" + ((x + y) % 4 + 1) + ".is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=7&x=" + x + "&y=" + y + "&z=" + z;
 }

 function drawFrame() {
 const ctx = canvas.getContext("2d");
 if (!ctx) return false;
 const { w, h, ox, oy } = mapOrigin();

 ctx.fillStyle = "#dde3ea";
 ctx.fillRect(0, 0, w, h);

 let visible = 0;
 tileJobs().forEach(({ x, y, dx, dy }) => {
 const img = tileCache.get(tileKey(state.zoom, x, y));
 if (img && img.complete && img.naturalWidth > 0) {
 ctx.drawImage(img, ox + dx * TILE, oy + dy * TILE, TILE, TILE);
 visible++;
 }
 });
 state.tilesVisible = visible;

 ctx.strokeStyle = "rgba(255,255,255,0.25)";
 ctx.lineWidth = 1;
 for (let x = 0; x < w; x += 32) {
 ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
 }
 for (let y = 0; y < h; y += 32) {
 ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
 }

 const px = w / 2;
 const py = h / 2;
 ctx.beginPath();
 ctx.arc(px, py, 28, 0, Math.PI * 2);
 ctx.fillStyle = "rgba(0,122,255,.18)";
 ctx.fill();
 ctx.strokeStyle = "#007aff";
 ctx.lineWidth = 2;
 ctx.stroke();
 ctx.beginPath();
 ctx.arc(px, py, 6, 0, Math.PI * 2);
 ctx.fillStyle = "#ff3b30";
 ctx.fill();

 ctx.fillStyle = "#fff";
 ctx.font = "bold 12px system-ui,sans-serif";
 ctx.strokeStyle = "rgba(0,0,0,.35)";
 ctx.lineWidth = 3;
 const label = "华亭嘉园 · z" + state.zoom + " · " + visible + " 片瓦片";
 ctx.strokeText(label, 12, h - 12);
 ctx.fillText(label, 12, h - 12);
 return true;
 }

 function resizeCanvas() {
 const dpr = window.devicePixelRatio || 1;
 const w = mapWrap.clientWidth;
 const h = mapWrap.clientHeight;
 canvas.width = Math.max(1, Math.floor(w * dpr));
 canvas.height = Math.max(1, Math.floor(h * dpr));
 canvas.style.width = w + "px";
 canvas.style.height = h + "px";
 const ctx = canvas.getContext("2d");
 ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
 drawFrame();
 }

 function loadTiles() {
 const gen = ++state.loadGen;
 state.tileOk = false;
 state.tileDrawn = false;
 const jobs = tileJobs();
 if (jobs.length === 0) return;

 let cachedReady = 0;
 const toFetch = [];

 jobs.forEach(({ x, y }) => {
 const key = tileKey(state.zoom, x, y);
 const cached = tileCache.get(key);
 if (cached && cached.complete && cached.naturalWidth > 0) {
 cachedReady++;
 } else {
 toFetch.push({ key, x, y });
 }
 });

 if (toFetch.length === 0) {
 finishTileLoad(gen, cachedReady);
 return;
 }

 let fetched = 0;
 let fetchOk = 0;

 toFetch.forEach(({ key, x, y }) => {
 const img = new Image();
 img.crossOrigin = "anonymous";
 const done = (ok) => {
 if (gen !== state.loadGen) return;
 if (ok) {
 tileCache.set(key, img);
 fetchOk++;
 }
 fetched++;
 if (fetched >= toFetch.length) {
 finishTileLoad(gen, cachedReady + fetchOk);
 }
 };
 img.onload = () => done(true);
 img.onerror = () => done(false);
 img.src = tileUrl(state.zoom, x, y);
 });
 }

 function finishTileLoad(gen, ready) {
 if (gen !== state.loadGen) return;
 state.tileOk = ready > 0;
 state.tileDrawn = ready > 0;
 drawFrame();
 if (state.tileDrawn) {
 setStatus("tile", true, state.tilesVisible + " 片瓦片可见");
 } else {
 setStatus("tile", false, "瓦片请求失败");
 }
 runSync();
 }

 function runSync() {
 tests.filter(t => !t.async).forEach(t => {
 const ok = !!t.run();
 let detail = "";
 if (t.id === "flex") detail = flexDetail();
 if (t.id === "zoom" && state.zoomClicked) detail = "z" + state.zoom;
 setStatus(t.id, ok, detail);
 });
 }

 function scheduleLayoutChecks() {
 requestAnimationFrame(() => {
 requestAnimationFrame(() => {
 resizeCanvas();
 runSync();
 });
 });
 }

 function changeZoom(delta) {
 state.zoomClicked = true;
 state.zoom = Math.max(10, Math.min(18, state.zoom + delta));
 resizeCanvas();
 loadTiles();
 setStatus("zoom", checkZoomVisible(), "z" + state.zoom);
 }

 document.getElementById("zoomIn").addEventListener("click", () => changeZoom(1));
 document.getElementById("zoomOut").addEventListener("click", () => changeZoom(-1));

 renderList();
 scheduleLayoutChecks();
 loadTiles();
 window.addEventListener("resize", () => {
 resizeCanvas();
 loadTiles();
 runSync();
 });
})();
</script>

<script>
(() => {
  // Cross-platform action bridge helper.
  // Works on:
  // - iOS: window.webkit.messageHandlers.openclawCanvasA2UIAction.postMessage(...)
  // - Android: window.openclawCanvasA2UIAction.postMessage(...)
  const handlerNames = ["openclawCanvasA2UIAction"];
  function postToNode(payload) {
    try {
      const raw = typeof payload === "string" ? payload : JSON.stringify(payload);
      for (const name of handlerNames) {
        const iosHandler = globalThis.webkit?.messageHandlers?.[name];
        if (iosHandler && typeof iosHandler.postMessage === "function") {
          iosHandler.postMessage(raw);
          return true;
        }
        const androidHandler = globalThis[name];
        if (androidHandler && typeof androidHandler.postMessage === "function") {
          // Important: call as a method on the interface object (binding matters on Android WebView).
          androidHandler.postMessage(raw);
          return true;
        }
      }
    } catch {}
    return false;
  }
  function sendUserAction(userAction) {
    const id =
      (userAction && typeof userAction.id === "string" && userAction.id.trim()) ||
      (globalThis.crypto?.randomUUID?.() ?? String(Date.now()));
    const action = { ...userAction, id };
    return postToNode({ userAction: action });
  }
  globalThis.OpenClaw = globalThis.OpenClaw ?? {};
  globalThis.OpenClaw.postMessage = postToNode;
  globalThis.OpenClaw.sendUserAction = sendUserAction;
  globalThis.openclawPostMessage = postToNode;
  globalThis.openclawSendUserAction = sendUserAction;

  try {
    const cap = new URLSearchParams(location.search).get("oc_cap");
    const proto = location.protocol === "https:" ? "wss" : "ws";
    const capQuery = cap ? "?oc_cap=" + encodeURIComponent(cap) : "";
    const ws = new WebSocket(proto + "://" + location.host + "/__openclaw__/ws" + capQuery);
    ws.onmessage = (ev) => {
      if (String(ev.data || "") === "reload") location.reload();
    };
  } catch {}
})();
</script>
</body>
</html>
