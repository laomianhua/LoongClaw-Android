<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>华亭家园→鸟巢 路线</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{overflow-y:auto;-webkit-overflow-scrolling:touch;background:#ffffff;color:#1f2937;font-family:-apple-system,PingFang SC,sans-serif;padding:12px}
h1{font-size:18px;font-weight:700;color:#111827;margin-bottom:2px}
.sub{font-size:12px;color:#6b7280;margin-bottom:10px}
#map{width:100%;height:400px;border-radius:14px;overflow:hidden;border:1px solid #e5e7eb}
.info{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:12px;margin-top:10px}
.info .row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px;color:#4b5563}
.info .row:last-child{margin-bottom:0}
.info .label{color:#6b7280}
.info .val{font-weight:600;color:#111827}
.f{text-align:center;font-size:10px;color:#9ca3af;margin-top:10px;padding:4px}
</style>
</head>
<body>
<h1>🚗 华亭家园 → 鸟巢</h1>
<div class="sub">驾车路线 · 步行约10分钟</div>
<div id="map"></div>
<div class="info" id="routeInfo">
  <div class="row"><span class="label">计算路线中...</span></div>
</div>
<div class="f">地图 © OSM · 路线 OSRM · 🦀 OpenClaw</div>

<script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
<script>
var map = L.map('map', {center:[39.987,116.384], zoom:15, zoomControl:true});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19}).addTo(map);

// 华亭家园
var home = [39.98546, 116.37859];
// 鸟巢
var nest = [39.9904, 116.3909];

L.marker(home).addTo(map).bindPopup('<b>🚗 华亭家园</b><br>你的车在这里');
L.marker(nest).addTo(map).bindPopup('<b>🏟️ 鸟巢</b><br>国家体育场');

// 获取路线
fetch('https://router.project-osrm.org/route/v1/walking/'+home[1]+','+home[0]+';'+nest[1]+','+nest[0]+'?geometries=geojson&overview=full')
  .then(r=>r.json())
  .then(data=>{
    var coords = data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
    var route = L.polyline(coords, {color:'#3b82f6', weight:4, opacity:0.8}).addTo(map);
    map.fitBounds(route.getBounds().pad(0.15));

    var dist = (data.routes[0].distance / 1000).toFixed(1);
    var dur = Math.round(data.routes[0].duration / 60);
    document.getElementById('routeInfo').innerHTML =
      '<div class="row"><span class="label">距离</span><span class="val">'+dist+' 公里</span></div>'+
      '<div class="row"><span class="label">步行时间</span><span class="val">约 '+dur+' 分钟</span></div>'+
      '<div class="row"><span class="label">起点</span><span class="val">华亭家园</span></div>'+
      '<div class="row"><span class="label">终点</span><span class="val">鸟巢</span></div>';
  })
  .catch(()=>{
    document.getElementById('routeInfo').innerHTML = '<div class="row"><span class="label">路线加载失败，请稍后再试</span></div>';
  });
</script>

<script>
(() => {
  // Cross-platform action bridge helper.
  // Works on:
  // - iOS: window.webkit.messageHandlers.openclawCanvasA2UIAction.postMessage(...)
  // - Android: window.openclawCanvasA2UIAction.postMessage(...)
  const handlerNames = ["openclawCanvasA2UIAction"];
  function postToNode(payload) {
    try {
      const raw = typeof payload === "string" ? payload : JSON.stringify(payload);
      for (const name of handlerNames) {
        const iosHandler = globalThis.webkit?.messageHandlers?.[name];
        if (iosHandler && typeof iosHandler.postMessage === "function") {
          iosHandler.postMessage(raw);
          return true;
        }
        const androidHandler = globalThis[name];
        if (androidHandler && typeof androidHandler.postMessage === "function") {
          // Important: call as a method on the interface object (binding matters on Android WebView).
          androidHandler.postMessage(raw);
          return true;
        }
      }
    } catch {}
    return false;
  }
  function sendUserAction(userAction) {
    const id =
      (userAction && typeof userAction.id === "string" && userAction.id.trim()) ||
      (globalThis.crypto?.randomUUID?.() ?? String(Date.now()));
    const action = { ...userAction, id };
    return postToNode({ userAction: action });
  }
  globalThis.OpenClaw = globalThis.OpenClaw ?? {};
  globalThis.OpenClaw.postMessage = postToNode;
  globalThis.OpenClaw.sendUserAction = sendUserAction;
  globalThis.openclawPostMessage = postToNode;
  globalThis.openclawSendUserAction = sendUserAction;

  try {
    const cap = new URLSearchParams(location.search).get("oc_cap");
    const proto = location.protocol === "https:" ? "wss" : "ws";
    const capQuery = cap ? "?oc_cap=" + encodeURIComponent(cap) : "";
    const ws = new WebSocket(proto + "://" + location.host + "/__openclaw__/ws" + capQuery);
    ws.onmessage = (ev) => {
      if (String(ev.data || "") === "reload") location.reload();
    };
  } catch {}
})();
</script>
</body>
</html>
